name: CI Build Push and Update Manifests

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

env:
  DOCKERHUB_USERNAME: ayaankhan17
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${{ secrets['DOCKERHUB_TOKEN'] }}" ]; then
            echo "DOCKERHUB_TOKEN secret is not set"
            exit 1
          fi
          echo "Using Docker Hub namespace: ${DOCKERHUB_USERNAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets['DOCKERHUB_TOKEN'] }}

      - name: Build and push catalog-management
        uses: docker/build-push-action@v6
        with:
          context: online_catalog/backend/catalog-management
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/catalog-management:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/catalog-management:latest

      - name: Build and push customer-support
        uses: docker/build-push-action@v6
        with:
          context: online_catalog/backend/customer-support
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/customer-support:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/customer-support:latest

      - name: Build and push order-processing
        uses: docker/build-push-action@v6
        with:
          context: online_catalog/backend/order-processing
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/order-processing:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/order-processing:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: online_catalog/frontend
          push: true
          tags: |
            docker.io/${{ env.DOCKERHUB_USERNAME }}/frontend:${{ env.IMAGE_TAG }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/frontend:latest

  update-kubernetes-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update image tags in Kubernetes manifests
        run: |
          set -e

          sed -i "s#image: docker.io/.*/catalog-management:.*#image: docker.io/${DOCKERHUB_USERNAME}/catalog-management:${IMAGE_TAG}#" online_catalog/kubernetes/catalog-management.yaml
          sed -i "s#image: docker.io/.*/customer-support:.*#image: docker.io/${DOCKERHUB_USERNAME}/customer-support:${IMAGE_TAG}#" online_catalog/kubernetes/customer-support.yaml
          sed -i "s#image: docker.io/.*/order-processing:.*#image: docker.io/${DOCKERHUB_USERNAME}/order-processing:${IMAGE_TAG}#" online_catalog/kubernetes/order-processing.yaml
          sed -i "s#image: docker.io/.*/frontend:.*#image: docker.io/${DOCKERHUB_USERNAME}/frontend:${IMAGE_TAG}#" online_catalog/kubernetes/frontend.yaml

      - name: Commit and push manifest updates
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git add online_catalog/kubernetes/catalog-management.yaml
          git add online_catalog/kubernetes/customer-support.yaml
          git add online_catalog/kubernetes/order-processing.yaml
          git add online_catalog/kubernetes/frontend.yaml
          git commit -m "ci: update kubernetes image tags to ${IMAGE_TAG} [skip ci]"
          git push
