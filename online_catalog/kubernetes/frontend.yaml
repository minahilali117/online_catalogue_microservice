apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: online-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/ayaankhan17/frontend:sha-23e946fa6084ebd9d4849fdbccf07e864c7132d1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_PRODUCTS_BASE_URL
              value: "http://107.23.87.55:30081"
            - name: REACT_APP_CUSTOMERS_BASE_URL
              value: "http://107.23.87.55:30082"
            - name: REACT_APP_ORDER_BASE_URL
              value: "http://107.23.87.55:30083"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: online-catalog
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30080
  type: NodePort