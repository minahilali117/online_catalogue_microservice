apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-management
  namespace: online-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-management
  template:
    metadata:
      labels:
        app: catalog-management
    spec:
      containers:
        - name: catalog-management
          image: docker.io/ayaankhan17/catalog-management:sha-1f708f3d17cc8ac4370242e7cb3af8e4929a62e7
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: PORT
              value: "8081"
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-management
  namespace: online-catalog
spec:
  selector:
    app: catalog-management
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      nodePort: 30081
  type: NodePort
